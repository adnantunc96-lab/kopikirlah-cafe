# ─────────────────────────────────────────────
# Decap CMS — Kopikirlah Cafe
# ─────────────────────────────────────────────

backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: id

# ─────────────────────────────────────────────
# KOLEKSIYONLAR
# ─────────────────────────────────────────────

collections:

  # ── 1. GENEL AYARLAR ──────────────────────
  - name: "ayarlar"
    label: "⚙️ Genel Ayarlar"
    files:

      - name: "site"
        label: "🏠 Site & Hero Bölümü"
        file: "site.json"
        fields:
          - { label: "Site Başlığı", name: "site_title", widget: "string" }
          - { label: "Meta Açıklaması", name: "meta_desc", widget: "text" }
          - { label: "Hero Badge Metni", name: "hero_badge", widget: "string" }
          - { label: "Hero Ana Başlık", name: "hero_title", widget: "string" }
          - { label: "Hero Alt Metin", name: "hero_subtitle", widget: "text" }
          - { label: "Buton 1 Metni", name: "hero_btn1", widget: "string" }
          - { label: "Buton 2 Metni", name: "hero_btn2", widget: "string" }

      - name: "whatsapp"
        label: "📱 WhatsApp Ayarları"
        file: "whatsapp.json"
        fields:
          - { label: "WhatsApp Numarası (örn: 628138251901)", name: "wa_number", widget: "string" }
          - { label: "Görünen Numara (örn: +62 813-8251-901)", name: "wa_display", widget: "string" }
          - { label: "Başlık", name: "wa_title", widget: "string" }
          - { label: "Açıklama", name: "wa_desc", widget: "text" }
          - { label: "Buton Metni", name: "wa_btn", widget: "string" }

      - name: "lokasi"
        label: "📍 Lokasyon Bilgileri"
        file: "lokasi.json"
        fields:
          - { label: "Adres Satır 1", name: "address1", widget: "string" }
          - { label: "Adres Satır 2", name: "address2", widget: "string" }
          - { label: "Google Maps URL", name: "maps_url", widget: "string" }
          - { label: "Google Rating", name: "rating", widget: "string" }
          - { label: "Rating Yorumu", name: "rating_quote", widget: "string" }
          - { label: "Instagram URL", name: "instagram_url", widget: "string" }
          - { label: "TikTok URL", name: "tiktok_url", widget: "string" }

  # ── 2. MENU UNGGULAN ──────────────────────
  - name: "unggulan"
    label: "⭐ Menu Unggulan"
    files:
      - name: "unggulan"
        label: "⭐ Menu Unggulan"
        file: "unggulan.json"
        fields:
          - label: "Menu Unggulan"
            name: "items"
            widget: "list"
            fields:
              - { label: "Emoji", name: "emoji", widget: "string", default: "☕" }
              - { label: "Nama Menu", name: "nama", widget: "string" }
              - { label: "Harga (contoh: 17.000 / 20.000)", name: "harga", widget: "string" }
              - { label: "Deskripsi", name: "deskripsi", widget: "text" }
              - label: "Foto (opsional)"
                name: "foto"
                widget: "image"
                required: false
              - { label: "Tampilkan?", name: "aktif", widget: "boolean", default: true }

  # ── 3. MENU LENGKAP ───────────────────────
  - name: "menu"
    label: "🍽️ Menu Lengkap"
    files:
      - name: "menu"
        label: "🍽️ Semua Kategori Menu"
        file: "menu.json"
        fields:
          - label: "Kategori"
            name: "kategoriler"
            widget: "list"
            fields:
              - { label: "ID Kategori", name: "id", widget: "string", hint: "Contoh: kopi, teh, milk, juice, snack, berat, cina, roti" }
              - { label: "Label (dengan emoji)", name: "label", widget: "string", hint: "Contoh: ☕ Espresso Base" }
              - { label: "Emoji", name: "emoji", widget: "string" }
              - { label: "Ada varian Hot/Ice?", name: "hot_ice", widget: "boolean", default: false }
              - label: "Item Menu"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Nama Menu", name: "nama", widget: "string" }
                  - { label: "Harga (Hot/Normal)", name: "harga_hot", widget: "string" }
                  - { label: "Harga Ice (kosongkan jika tidak ada)", name: "harga_ice", widget: "string", required: false, default: "" }
                  - label: "Foto (opsional)"
                    name: "foto"
                    widget: "image"
                    required: false
                  - { label: "Tampilkan?", name: "aktif", widget: "boolean", default: true }
